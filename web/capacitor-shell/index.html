<!doctype html>
<html lang="ko">
  <head>

    <title>Price Ping</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;

        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        margin: 0 0 12px;

  <body>
    <main>
      <h1>Price Ping</h1>
      <p>

      </p>
    </main>
  </body>
 </html>
